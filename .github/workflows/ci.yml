name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22.x", "23.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  smoke-stock-node:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Compiled bin runs on stock Node 20 (no flags)
        run: |
          node dist/leash.js status
          echo '{"cwd":"'"$PWD"'","tool_name":"Bash","tool_input":{"command":"git push --force"}}' \
            | node dist/leash.js hook && (echo "expected block, got exit 0" && exit 1) || echo "blocked as expected"
